# Supabase local/dev configuration for SmartCanteen 360.
# The PUBLIC schema (application tables) is owned by Prisma migrations in
# packages/database/prisma/migrations. The Supabase CLI here manages platform
# concerns only: storage buckets, extensions, auth/studio for local dev.

project_id = "smartcanteen-360"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000", "smartcanteen://"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

# Note: SmartCanteen uses its own JWT auth via the NestJS API, not Supabase Auth.
# Supabase Auth is left enabled only for local Studio convenience.

[analytics]
enabled = false
